<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    
<main>
    <section class="enemy">
        <div id="enemy-hud">
            <div id="progress" value="0" max="100">

                HP <span class="outer"><span class="inner"></span></span>
                <div id ="enemyHP"> part/whole</div>
            </div>

        </div>
        <div>
            <img src="" alt="not here" id="ePoke">
        </div>

    </section>
    <section class="player">
        <div class = "player-poke">
            <span>
                <img src="" alt="Pokemon sprite" id="pPoke">
            </span>
            
        </div>
        <div >
            <div id = "player-hud">
                <div id="progress" value="0" max="100">

                    HP <span class="outer"><span class="inner"></span></span>
                    <div id ="percent"> part/whole</div>
                </div>
            </div>

        </div>
        
    </section>
    <footer>
        <div class="choice-options">
            <div class="fight-ui">
                What will you do?
            </div>
            <div class="battle-options">
                <button class="choice" id="FIGHT" onclick="playerMoves(charmander_endpoint)">
                    FIGHT
                </button>
                   <button class="choice" id="BAG">
                    BAG
                   </button>
                   <button class="choice" id = "POKEMON">
                    POKéMON
                   </button>
                   <button class="choice" id="RUN">
                    RUN
                   </button>
            </div>
                    
        </div>
   </footer>
</main>

    <script src="script.js"></script>
</body>

</html>
